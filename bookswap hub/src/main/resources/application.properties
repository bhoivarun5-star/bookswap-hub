spring.application.name=bookswap-hub

# ─── Database Connection ──────────────────────────────────────────────────────
# Default to local H2 so the app can run without external DB credentials.
# Set DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD for PostgreSQL environments.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:bookswap;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# Connection pool settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# H2 console for local development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Keep Alive (Render) ──────────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:}

